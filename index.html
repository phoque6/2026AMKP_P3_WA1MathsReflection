<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Maths Reflection</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #fdf2f8; padding: 24px; }
    .container { max-width: 1200px; margin: auto; background: white; border: 4px solid #fbcfe8; border-radius: 28px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
    .top-row { display: flex; justify-content: space-between; margin-bottom: 24px; gap: 20px; flex-wrap: wrap; }
    label { font-weight: bold; font-size: 18px; display: block; margin-bottom: 8px; }
    input, textarea { width: 100%; padding: 12px; border: 2px solid #d1d5db; border-radius: 14px; font-size: 16px; box-sizing: border-box; }
    .top-row input { width: 220px; border: none; border-bottom: 2px solid #777; border-radius: 0; background: transparent; }
    .smart-box { background: #f3e8ff; border-radius: 28px; padding: 20px; margin-bottom: 32px; }
    h1 { text-align: center; color: #6b21a8; font-size: 34px; margin-bottom: 24px; }
    .smart-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; text-align: center; }
    .smart-card, .field-box { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
    .letter { font-size: 52px; font-weight: 900; color: #9333ea; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .reflection-card { border: 4px solid; border-radius: 28px; padding: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
    .green { background: #dcfce7; border-color: #86efac; }
    .indigo { background: #e0e7ff; border-color: #a5b4fc; }
    .yellow { background: #fef9c3; border-color: #fde047; }
    h2 { text-align: center; font-size: 32px; margin-top: 0; }
    .field-box { margin-bottom: 16px; }
    .emoji-row { display: flex; justify-content: space-around; font-size: 40px; }
    .emoji { cursor: pointer; border: none; background: white; font-size: 40px; transition: transform 0.2s; border-radius: 50%; padding: 4px 10px; }
    .emoji:hover, .selected { transform: scale(1.25); outline: 4px solid #c084fc; }
    .submit-btn { display: block; margin: 32px auto 0; background: #9333ea; color: white; font-size: 22px; font-weight: bold; padding: 16px 40px; border: none; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
    .submit-btn:hover { background: #7e22ce; transform: scale(1.05); }
    .status { text-align: center; font-weight: bold; margin-top: 18px; color: #6b21a8; }
    @media (max-width: 900px) { .smart-grid, .cards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <form id="reflectionForm" class="container">
    <div class="top-row">
      <div><label>Name:</label><input name="name" required placeholder="Type your name"></div>
      <div><label>Class:</label><input name="className" required placeholder="Class"></div>
    </div>

    <div class="smart-box">
      <h1>MY MATHS GOAL IS SMART</h1>
      <div class="smart-grid">
        <div class="smart-card"><div class="letter">S</div><b>Specific</b><p>I know what I want to improve.</p></div>
        <div class="smart-card"><div class="letter">M</div><b>Measurable</b><p>I can check my progress.</p></div>
        <div class="smart-card"><div class="letter">A</div><b>Attainable</b><p>I can achieve this goal.</p></div>
        <div class="smart-card"><div class="letter">R</div><b>Relevant</b><p>This goal helps my learning.</p></div>
        <div class="smart-card"><div class="letter">T</div><b>Timely</b><p>I will complete it on time.</p></div>
      </div>
    </div>

    <div class="cards">
      <div class="reflection-card green">
        <h2>WA1</h2>
        <div class="field-box"><label>My target score</label><input name="wa1Target"></div>
        <div class="field-box"><label>My actual score</label><input name="wa1Actual"></div>
        <div class="field-box"><label>One thing I did well this time</label><textarea name="wa1DidWell" rows="4"></textarea></div>
        <div class="field-box"><label>One thing I can do better next time</label><textarea name="wa1Improve" rows="4"></textarea></div>
        <div class="field-box"><label>I will not give up because</label><textarea name="wa1NotGiveUp" rows="4"></textarea></div>
      </div>

      <div class="reflection-card indigo">
        <h2>WA2</h2>
        <div class="field-box"><label>My target score</label><input name="wa2Target"></div>
        <div class="field-box"><label>My actual score</label><input name="wa2Actual"></div>
        <div class="field-box"><label>One thing I did well this time</label><textarea name="wa2DidWell" rows="4"></textarea></div>
        <div class="field-box"><label>One thing I can do better next time</label><textarea name="wa2Improve" rows="4"></textarea></div>
        <div class="field-box"><label>I will not give up because</label><textarea name="wa2NotGiveUp" rows="4"></textarea></div>
      </div>

      <div class="reflection-card yellow">
        <h2>EYE</h2>
        <div class="field-box"><label>My target score</label><input name="eyeTarget"></div>
        <div class="field-box"><label>My actual score</label><input name="eyeActual"></div>
        <div class="field-box"><label>One thing I did well this time</label><textarea name="eyeDidWell" rows="4"></textarea></div>
        <div class="field-box"><label>One thing I can do better next time</label><textarea name="eyeImprove" rows="4"></textarea></div>
        <div class="field-box"><label>I will not give up because</label><textarea name="eyeNotGiveUp" rows="4"></textarea></div>
      </div>
    </div>

    <button class="submit-btn" type="submit">Submit My Reflection</button>
    <div id="status" class="status"></div>
  </form>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYJFm3c9kiRxYVIYUmN_M2RamIYWFd1uZ6Y6uaIpaqiidO0io9SxQsqB68TgYr4X2oBw/exec";

    document.getElementById("reflectionForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const status = document.getElementById("status");
      status.textContent = "Submitting...";

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        status.textContent = "Submitted successfully!";
        e.target.reset();
      } catch (error) {
        status.textContent = "Submission failed.";
      }
    });
  </script>
</body>
</html>
