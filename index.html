<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Maths Reflection</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fdf2f8;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: #1f2937;
    }

    .page {
      min-height: 100vh;
      background: #fdf2f8;
    }

    .main-card {
      max-width: 1152px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.15);
      padding: 24px;
      border: 4px solid #fbcfe8;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .top-field label {
      font-weight: 700;
      font-size: 18px;
      margin-right: 8px;
    }

    .top-field input {
      border: none;
      border-bottom: 2px solid #9ca3af;
      outline: none;
      padding: 4px 8px;
      font-size: 16px;
      background: transparent;
      min-width: 180px;
    }

    .smart-section {
      background: #f3e8ff;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 32px;
    }

    .smart-section h1 {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      color: #6b21a8;
      margin: 0 0 16px 0;
    }

    .smart-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      text-align: center;
    }

    .smart-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
    }

    .smart-letter {
      font-size: 48px;
      font-weight: 900;
      color: #9333ea;
      margin-bottom: 8px;
    }

    .smart-word {
      font-weight: 700;
      font-size: 18px;
    }

    .smart-card p {
      font-size: 14px;
      color: #4b5563;
      margin-top: 8px;
      line-height: 1.4;
    }

    .reflection-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .reflection-card {
      border: 4px solid;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
    }

    .green {
      background: #dcfce7;
      border-color: #86efac;
    }

    .indigo {
      background: #e0e7ff;
      border-color: #a5b4fc;
    }

    .yellow {
      background: #fef9c3;
      border-color: #fde047;
    }

    .reflection-card h2 {
      font-size: 30px;
      font-weight: 800;
      text-align: center;
      color: #1f2937;
      margin: 0 0 20px 0;
    }

    .space-y > div {
      margin-bottom: 16px;
    }

    .input-box,
    .textarea-box,
    .feeling-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
    }

    .input-box label,
    .textarea-box label,
    .feeling-box label {
      display: block;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .input-box input,
    .textarea-box textarea {
      width: 100%;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      outline: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    .input-box input:focus,
    .textarea-box textarea:focus {
      border-color: #c084fc;
      box-shadow: 0 0 0 3px rgba(216, 180, 254, 0.6);
    }

    .textarea-box textarea {
      resize: vertical;
      min-height: 110px;
    }

    .emoji-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      font-size: 40px;
    }

    .emoji-btn {
      border: none;
      background: transparent;
      font-size: 40px;
      cursor: pointer;
      transition: transform 0.2s ease;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .emoji-btn:hover,
    .emoji-btn.selected {
      transform: scale(1.25);
      outline: 4px solid #d8b4fe;
      background: #faf5ff;
    }

    .submit-btn {
      display: block;
      margin: 32px auto 0 auto;
      background: #9333ea;
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px 40px;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .submit-btn:hover {
      background: #7e22ce;
      transform: scale(1.05);
    }

    .status {
      text-align: center;
      margin-top: 16px;
      font-weight: 700;
      font-size: 18px;
      color: #6b21a8;
    }

    @media (max-width: 900px) {
      .smart-grid,
      .reflection-grid {
        grid-template-columns: 1fr;
      }

      .top-row {
        align-items: flex-start;
      }

      .top-field input {
        width: 100%;
      }

      .smart-section h1 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <form id="reflectionForm" class="main-card">
      <div class="top-row">
        <div class="top-field">
          <label>Name:</label>
          <input type="text" name="name" required placeholder="Type your name" />
        </div>

        <div class="top-field">
          <label>Class:</label>
          <input type="text" name="className" required placeholder="Class" />
        </div>
      </div>

      <div class="smart-section">
        <h1>MY MATHS GOAL IS SMART</h1>

        <div class="smart-grid">
          <div class="smart-card">
            <div class="smart-letter">S</div>
            <div class="smart-word">Specific</div>
            <p>I know what I want to improve.</p>
          </div>

          <div class="smart-card">
            <div class="smart-letter">M</div>
            <div class="smart-word">Measurable</div>
            <p>I can check my progress.</p>
          </div>

          <div class="smart-card">
            <div class="smart-letter">A</div>
            <div class="smart-word">Attainable</div>
            <p>I can achieve this goal.</p>
          </div>

          <div class="smart-card">
            <div class="smart-letter">R</div>
            <div class="smart-word">Relevant</div>
            <p>This goal helps my learning.</p>
          </div>

          <div class="smart-card">
            <div class="smart-letter">T</div>
            <div class="smart-word">Timely</div>
            <p>I will complete it on time.</p>
          </div>
        </div>
      </div>

      <div class="reflection-grid">
        <div class="reflection-card green">
          <h2>WA1</h2>

          <div class="space-y">
            <div class="input-box">
              <label>My target score</label>
              <input type="text" name="wa1Target" placeholder="Example: 18/20" />
            </div>

            <div class="input-box">
              <label>My actual score</label>
              <input type="text" name="wa1Actual" placeholder="Example: 16/20" />
            </div>

            <div class="textarea-box">
              <label>One thing I did well this time</label>
              <textarea name="wa1DidWell" rows="4" placeholder="I checked my answers carefully."></textarea>
            </div>

            <div class="textarea-box">
              <label>One thing I can do better next time</label>
              <textarea name="wa1Improve" rows="4" placeholder="I will show my working clearly."></textarea>
            </div>

            <div class="textarea-box">
              <label>I will not give up because</label>
              <textarea name="wa1NotGiveUp" rows="4" placeholder="Mistakes help me learn and improve."></textarea>
            </div>

            <div class="feeling-box">
              <label>How do I feel about my Maths learning?</label>
              <div class="emoji-row">
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa1Feeling', this)">😊</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa1Feeling', this)">😐</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa1Feeling', this)">😟</button>
              </div>
              <input type="hidden" name="wa1Feeling" />
            </div>
          </div>
        </div>

        <div class="reflection-card indigo">
          <h2>WA2</h2>

          <div class="space-y">
            <div class="input-box">
              <label>My target score</label>
              <input type="text" name="wa2Target" placeholder="Example: 18/20" />
            </div>

            <div class="input-box">
              <label>My actual score</label>
              <input type="text" name="wa2Actual" placeholder="Example: 16/20" />
            </div>

            <div class="textarea-box">
              <label>One thing I did well this time</label>
              <textarea name="wa2DidWell" rows="4" placeholder="I checked my answers carefully."></textarea>
            </div>

            <div class="textarea-box">
              <label>One thing I can do better next time</label>
              <textarea name="wa2Improve" rows="4" placeholder="I will show my working clearly."></textarea>
            </div>

            <div class="textarea-box">
              <label>I will not give up because</label>
              <textarea name="wa2NotGiveUp" rows="4" placeholder="Mistakes help me learn and improve."></textarea>
            </div>

            <div class="feeling-box">
              <label>How do I feel about my Maths learning?</label>
              <div class="emoji-row">
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa2Feeling', this)">😊</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa2Feeling', this)">😐</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('wa2Feeling', this)">😟</button>
              </div>
              <input type="hidden" name="wa2Feeling" />
            </div>
          </div>
        </div>

        <div class="reflection-card yellow">
          <h2>EYE</h2>

          <div class="space-y">
            <div class="input-box">
              <label>My target score</label>
              <input type="text" name="eyeTarget" placeholder="Example: 18/20" />
            </div>

            <div class="input-box">
              <label>My actual score</label>
              <input type="text" name="eyeActual" placeholder="Example: 16/20" />
            </div>

            <div class="textarea-box">
              <label>One thing I did well this time</label>
              <textarea name="eyeDidWell" rows="4" placeholder="I checked my answers carefully."></textarea>
            </div>

            <div class="textarea-box">
              <label>One thing I can do better next time</label>
              <textarea name="eyeImprove" rows="4" placeholder="I will show my working clearly."></textarea>
            </div>

            <div class="textarea-box">
              <label>I will not give up because</label>
              <textarea name="eyeNotGiveUp" rows="4" placeholder="Mistakes help me learn and improve."></textarea>
            </div>

            <div class="feeling-box">
              <label>How do I feel about my Maths learning?</label>
              <div class="emoji-row">
                <button type="button" class="emoji-btn" onclick="selectEmoji('eyeFeeling', this)">😊</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('eyeFeeling', this)">😐</button>
                <button type="button" class="emoji-btn" onclick="selectEmoji('eyeFeeling', this)">😟</button>
              </div>
              <input type="hidden" name="eyeFeeling" />
            </div>
          </div>
        </div>
      </div>

      <button class="submit-btn" type="submit">Submit My Reflection</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYJFm3c9kiRxYVIYUmN_M2RamIYWFd1uZ6Y6uaIpaqiidO0io9SxQsqB68TgYr4X2oBw/exec";

    function selectEmoji(fieldName, button) {
      document.querySelector(`[name="${fieldName}"]`).value = button.textContent;

      const buttons = button.parentElement.querySelectorAll(".emoji-btn");
      buttons.forEach(btn => btn.classList.remove("selected"));
      button.classList.add("selected");
    }

    document.getElementById("reflectionForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const status = document.getElementById("status");
      status.textContent = "Submitting...";

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });

        status.textContent = "Reflection submitted successfully!";
        e.target.reset();
        document.querySelectorAll(".emoji-btn").forEach(btn => btn.classList.remove("selected"));
      } catch (error) {
        status.textContent = "Submission failed. Please try again.";
        console.log(error);
      }
    });
  </script>
</body>
</html>
